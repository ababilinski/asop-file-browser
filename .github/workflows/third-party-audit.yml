name: Audit third-party releases

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate checked-in metadata
        run: python3 scripts/validate-third-party-metadata.py

      - name: Compare official releases
        id: audit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 scripts/audit-third-party-upstream.py --markdown third-party-audit.md
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ "$status" -ne 0 && "$status" -ne 2 ]]; then
            exit "$status"
          fi

      - name: Open, update, or close the review issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.status }}
        with:
          script: |
            const fs = require('fs');
            const title = '[Third-party audit] Review managed ADB and scrcpy versions';
            const body = fs.readFileSync('third-party-audit.md', 'utf8');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);

            if (process.env.AUDIT_STATUS === '2') {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                  state: 'open',
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
              }
            } else if (existing?.state === 'open') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: 'closed',
                state_reason: 'completed',
              });
            }
