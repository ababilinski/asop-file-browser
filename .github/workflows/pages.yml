name: Deploy product page

on:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "TOOLS.md"
      - "THIRD_PARTY_NOTICES.md"
      - "ThirdPartyLicenses/**"
      - "Sources/AndroidFileBrowserCore/ToolchainManager.swift"
      - "Tests/AndroidFileBrowserCoreTests/ToolchainManagerTests.swift"
      - "scripts/package-app.sh"
      - "scripts/validate-third-party-metadata.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate third-party notices
        run: python3 scripts/validate-third-party-metadata.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload website
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
