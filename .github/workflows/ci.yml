name: Pull request validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Optional pull request whose release label should be checked
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Validation scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.scope.outputs.app }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Decide whether app validation is needed
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            RANGE="$PR_BASE_SHA...$PR_HEAD_SHA"
          elif [[ "$EVENT_NAME" == "merge_group" && -n "$MERGE_BASE_SHA" ]]; then
            RANGE="$MERGE_BASE_SHA...$GITHUB_SHA"
          elif [[ "$EVENT_NAME" == "push" && "$PUSH_BEFORE_SHA" =~ [^0] ]] &&
               git cat-file -e "$PUSH_BEFORE_SHA^{commit}" 2>/dev/null; then
            RANGE="$PUSH_BEFORE_SHA..$GITHUB_SHA"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP_CHANGED=false
          while IFS= read -r path; do
            case "$path" in
              docs/*|*.md|LICENSE|scripts/README.md|.github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE.md)
                ;;
              *)
                APP_CHANGED=true
                break
                ;;
            esac
          done < <(git diff --name-only "$RANGE")
          echo "app=$APP_CHANGED" >> "$GITHUB_OUTPUT"

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate GitHub Actions workflows
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          ARCHIVE="$RUNNER_TEMP/actionlint.tar.gz"
          curl \
            --proto '=https' \
            --tlsv1.2 \
            --fail \
            --location \
            --show-error \
            --silent \
            "https://github.com/rhysd/actionlint/releases/download/v$ACTIONLINT_VERSION/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$ARCHIVE"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$ARCHIVE" | sha256sum --check --strict -
          tar -xzf "$ARCHIVE" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" \
            -shellcheck= \
            -pyflakes= \
            .github/workflows/*.yml

  release-label:
    name: Release label
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.pull_request_number != '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check labels from the pull request event
        if: ${{ github.event_name == 'pull_request' }}
        env:
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: python3 scripts/release_metadata.py validate-labels --labels-json "$LABELS_JSON"

      - name: Check labels for a dispatched pull request
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          LABELS_JSON="$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name]')"
          python3 scripts/release_metadata.py validate-labels --labels-json "$LABELS_JSON"

  tests:
    name: Tests
    needs:
      - changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build the app target
        run: swift build -c release --product AndroidFileBrowser

      - name: Run app tests
        run: swift test -c release

      - name: Run safe MTPKit tests
        run: >-
          swift test -c release
          --package-path Vendor/MTPKit
          --filter 'ADBParserTests|MTPCodecTests|MockTransportTests|USBDiagnosticsTests'

  artifact:
    name: Release artifact
    needs:
      - changes
      - tests
    if: ${{ needs.changes.outputs.app == 'true' && needs.tests.result == 'success' }}
    runs-on: macos-15
    timeout-minutes: 35
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate scripts and third-party metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --check "$PR_BASE_SHA...$PR_HEAD_SHA" -- . ':(exclude)ThirdPartyLicenses/Android-SDK-Platform-Tools-37.0.0-NOTICE.txt'
          elif [[ "$EVENT_NAME" == "merge_group" && -n "$MERGE_BASE_SHA" ]]; then
            git diff --check "$MERGE_BASE_SHA...$GITHUB_SHA" -- . ':(exclude)ThirdPartyLicenses/Android-SDK-Platform-Tools-37.0.0-NOTICE.txt'
          elif [[ "$EVENT_NAME" == "push" && "$PUSH_BEFORE_SHA" =~ [^0] ]] && git cat-file -e "$PUSH_BEFORE_SHA^{commit}" 2>/dev/null; then
            git diff --check "$PUSH_BEFORE_SHA..$GITHUB_SHA" -- . ':(exclude)ThirdPartyLicenses/Android-SDK-Platform-Tools-37.0.0-NOTICE.txt'
          else
            git diff-tree --check --root -r -m "$GITHUB_SHA" -- . ':(exclude)ThirdPartyLicenses/Android-SDK-Platform-Tools-37.0.0-NOTICE.txt'
          fi
          find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' script; do
            bash -n "$script"
          done
          python3 -m py_compile scripts/*.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'
          python3 scripts/validate-third-party-metadata.py

      - name: Build universal and native app bundles
        run: |
          while IFS='|' read -r architecture directory; do
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}" \
            APP_BUILD="${GITHUB_RUN_NUMBER}" \
            APP_ARCHITECTURE="$architecture" \
            APP_BUNDLE_OUTPUT_PATH=".build/$directory/ASOP File Browser.app" \
            CODE_SIGN_IDENTITY="-" \
            ./scripts/package-app.sh
          done <<'VARIANTS'
          universal|release-universal
          arm64|release-arm64
          x86_64|release-x86_64
          VARIANTS

      - name: Create and verify the downloadable disk images
        run: |
          while IFS='|' read -r architecture directory suffix; do
            RELEASE_ARTIFACT_SUFFIX="$suffix" \
            ./scripts/create-release-disk-image.sh \
              ".build/$directory/ASOP File Browser.app" \
              "dist" \
              "0.0.${GITHUB_RUN_NUMBER}" \
              --version "0.0.${GITHUB_RUN_NUMBER}" \
              --build "${GITHUB_RUN_NUMBER}" \
              --architecture "$architecture" \
              --require-no-bundled-tools
          done <<'VARIANTS'
          universal|release-universal|
          arm64|release-arm64|Apple-Silicon
          x86_64|release-x86_64|Intel
          VARIANTS

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ASOP-File-Browser-candidate-${{ github.sha }}
          path: |
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS.dmg
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS.dmg.sha256
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS-Apple-Silicon.dmg
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS-Apple-Silicon.dmg.sha256
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS-Intel.dmg
            dist/ASOP-File-Browser-0.0.${{ github.run_number }}-macOS-Intel.dmg.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  artifact-launch:
    name: App launch (${{ matrix.name }})
    needs:
      - changes
      - artifact
    if: ${{ needs.changes.outputs.app == 'true' && needs.artifact.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple silicon
            runner: macos-15
            architecture: arm64
            suffix: Apple-Silicon
          - name: Intel
            runner: macos-15-intel
            architecture: x86_64
            suffix: Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download the exact release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ASOP-File-Browser-candidate-${{ github.sha }}
          path: dist

      - name: Verify and open the universal and native apps
        env:
          NATIVE_ARCHITECTURE: ${{ matrix.architecture }}
          NATIVE_SUFFIX: ${{ matrix.suffix }}
        run: |
          while IFS='|' read -r architecture suffix; do
            file_suffix="${suffix:+-$suffix}"
            disk_image="dist/ASOP-File-Browser-0.0.${GITHUB_RUN_NUMBER}-macOS$file_suffix.dmg"
            (
              cd dist
              shasum -a 256 -c "$(basename "$disk_image").sha256"
            )
            ./scripts/validate-release-disk-image.sh \
              "$disk_image" \
              --version "0.0.${GITHUB_RUN_NUMBER}" \
              --build "${GITHUB_RUN_NUMBER}" \
              --architecture "$architecture" \
              --require-no-bundled-tools \
              --launch-app
          done <<VARIANTS
          universal|
          $NATIVE_ARCHITECTURE|$NATIVE_SUFFIX
          VARIANTS

  release-readiness:
    name: Release readiness
    if: ${{ always() }}
    needs:
      - changes
      - workflow-lint
      - release-label
      - tests
      - artifact
      - artifact-launch
    runs-on: ubuntu-latest
    steps:
      - name: Require every build, test, and packaging job
        env:
          DISPATCH_PR_NUMBER: ${{ inputs.pull_request_number }}
          EVENT_NAME: ${{ github.event_name }}
          APP_VALIDATION: ${{ needs.changes.outputs.app }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          LABEL_RESULT: ${{ needs.release-label.result }}
          LINT_RESULT: ${{ needs.workflow-lint.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          ARTIFACT_RESULT: ${{ needs.artifact.result }}
          APP_LAUNCH_RESULT: ${{ needs.artifact-launch.result }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" || -n "$DISPATCH_PR_NUMBER" ]]; then
            EXPECTED_LABEL_RESULT="success"
          else
            EXPECTED_LABEL_RESULT="skipped"
          fi
          if [[ "$LABEL_RESULT" != "$EXPECTED_LABEL_RESULT" ]]; then
            echo "Release label: $LABEL_RESULT"
            exit 1
          fi
          if [[ "$APP_VALIDATION" == "true" ]]; then
            EXPECTED_APP_RESULT="success"
          else
            EXPECTED_APP_RESULT="skipped"
          fi
          if [[ "$CHANGES_RESULT" != "success" ||
                "$LINT_RESULT" != "success" ||
                "$TESTS_RESULT" != "$EXPECTED_APP_RESULT" ||
                "$ARTIFACT_RESULT" != "$EXPECTED_APP_RESULT" ||
                "$APP_LAUNCH_RESULT" != "$EXPECTED_APP_RESULT" ]]; then
            echo "Validation scope: $CHANGES_RESULT (app=$APP_VALIDATION)"
            echo "Workflow lint: $LINT_RESULT"
            echo "Tests: $TESTS_RESULT"
            echo "Release artifact: $ARTIFACT_RESULT"
            echo "App launch: $APP_LAUNCH_RESULT"
            exit 1
          fi
