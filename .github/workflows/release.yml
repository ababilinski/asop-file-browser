name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version with three numeric parts, such as 1.2.3
        required: true
        type: string
      build:
        description: Commit count from git rev-list --count for the release commit
        required: true
        type: string
      commit:
        description: Full commit SHA from main to publish
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  candidate:
    name: Prepare release candidate
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      APP_VERSION: ${{ inputs.version }}
      APP_BUILD: ${{ inputs.build }}
      RELEASE_SHA: ${{ inputs.commit }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.commit }}

      - name: Validate release request
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases must be started from main, not $GITHUB_REF." >&2
            exit 1
          fi
          if [[ ! "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must contain three numeric parts, such as 1.2.3." >&2
            exit 1
          fi
          if [[ ! "$APP_BUILD" =~ ^[1-9][0-9]*$ ]]; then
            echo "Build must be a positive integer." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Commit must be a full 40-character SHA." >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]]; then
            echo "The checked-out commit does not match $RELEASE_SHA." >&2
            exit 1
          fi
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "Commit $RELEASE_SHA is not part of main." >&2
            exit 1
          fi
          LATEST_TAG="$(
            git tag --merged "$RELEASE_SHA" --list '[0-9]*' --sort=-v:refname |
              while IFS= read -r tag; do
                if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                  echo "$tag"
                  break
                fi
              done
          )"
          if [[ -z "$LATEST_TAG" ]]; then
            if [[ "$APP_VERSION" != "1.0.0" ]]; then
              echo "A repository without a prior release tag must start at version 1.0.0." >&2
              exit 1
            fi
            if [[ "$(git rev-list --count "$RELEASE_SHA")" != "1" ]]; then
              echo "The initial 1.0.0 release must be built from the repository's root commit." >&2
              exit 1
            fi
          else
            python3 scripts/release_metadata.py version-transition \
              --from-ref "$LATEST_TAG" \
              --head "$RELEASE_SHA" \
              --version "$APP_VERSION"
          fi
          EXPECTED_BUILD="$(git rev-list --count "$RELEASE_SHA")"
          if [[ "$APP_BUILD" != "$EXPECTED_BUILD" ]]; then
            echo "Build $APP_BUILD does not match commit count $EXPECTED_BUILD." >&2
            exit 1
          fi
          TRACKED_VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ "$APP_VERSION" != "$TRACKED_VERSION" ]]; then
            echo "Requested version $APP_VERSION does not match VERSION ($TRACKED_VERSION)." >&2
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/$APP_VERSION"; then
            echo "Tag $APP_VERSION already exists." >&2
            exit 1
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Validate scripts and third-party metadata
        run: |
          git diff-tree --check --root -r -m "$RELEASE_SHA" -- . ':(exclude)ThirdPartyLicenses/Android-SDK-Platform-Tools-37.0.0-NOTICE.txt'
          find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' script; do
            bash -n "$script"
          done
          python3 -m py_compile scripts/*.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'
          python3 scripts/validate-third-party-metadata.py

      - name: Build the app target
        run: swift build -c release --product AndroidFileBrowser

      - name: Run app tests
        run: swift test -c release

      - name: Run safe MTPKit tests
        run: >-
          swift test -c release
          --package-path Vendor/MTPKit
          --filter 'ADBParserTests|MTPCodecTests|MockTransportTests|USBDiagnosticsTests'

      - name: Verify the managed phone-tool download
        env:
          AFB_LIVE_TOOLCHAIN_TEST: "1"
        run: >-
          swift test -c release
          --filter 'ToolchainManagerTests/testLiveOfficialArchiveInstallsBothToolsWhenEnabled'

      - name: Build and verify the unsigned candidates
        run: |
          while IFS='|' read -r architecture directory; do
            APP_VERSION="$APP_VERSION" \
            APP_BUILD="$APP_BUILD" \
            APP_ARCHITECTURE="$architecture" \
            APP_BUNDLE_OUTPUT_PATH=".build/$directory/ASOP File Browser.app" \
            CODE_SIGN_IDENTITY="-" \
            ./scripts/package-app.sh
          done <<'VARIANTS'
          universal|release-universal
          arm64|release-arm64
          x86_64|release-x86_64
          VARIANTS

          while IFS='|' read -r architecture directory suffix; do
            app_path=".build/$directory/ASOP File Browser.app"
            RELEASE_ARTIFACT_SUFFIX="$suffix" \
            ./scripts/create-release-archive.sh \
              "$app_path" \
              "dist" \
              "$APP_VERSION" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --require-no-bundled-tools
            RELEASE_ARTIFACT_SUFFIX="$suffix" \
            ./scripts/create-release-disk-image.sh \
              "$app_path" \
              "dist" \
              "$APP_VERSION" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --require-no-bundled-tools
          done <<'VARIANTS'
          universal|release-universal|
          arm64|release-arm64|Apple-Silicon
          x86_64|release-x86_64|Intel
          VARIANTS

      - name: Open the tested candidate
        run: ./scripts/verify-app-launch.sh ".build/release-universal/ASOP File Browser.app"

      - name: Upload candidate for signing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-${{ inputs.commit }}-${{ inputs.version }}-${{ inputs.build }}
          path: |
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS.zip
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS.zip.sha256
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Apple-Silicon.zip
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Apple-Silicon.zip.sha256
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Intel.zip
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Intel.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  sign-and-notarize:
    name: Sign and notarize
    needs:
      - candidate
    runs-on: macos-15
    timeout-minutes: 90
    environment: release
    permissions:
      contents: read
    outputs:
      universal_dmg_sha256: ${{ steps.release_digest.outputs.universal_sha256 }}
      arm64_dmg_sha256: ${{ steps.release_digest.outputs.arm64_sha256 }}
      x86_64_dmg_sha256: ${{ steps.release_digest.outputs.x86_64_sha256 }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      APP_VERSION: ${{ inputs.version }}
      APP_BUILD: ${{ inputs.build }}
      RELEASE_SHA: ${{ inputs.commit }}
      APPLE_TEAM_ID: 2XPCVTQ4HN
    steps:
      - name: Check out the release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.commit }}

      - name: Configure temporary release paths
        run: |
          {
            echo "RELEASE_STAGING_ROOT=$RUNNER_TEMP/release-staging"
            echo "CERTIFICATE_PATH=$RUNNER_TEMP/developer-id-application.p12"
            echo "NOTARY_KEY_PATH=$RUNNER_TEMP/notary-api-key.p8"
            echo "KEYCHAIN_PATH=$RUNNER_TEMP/release-signing.keychain-db"
            echo "NOTARY_RECORDS=$RUNNER_TEMP/notary-records"
          } >> "$GITHUB_ENV"

      - name: Download tested candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ inputs.commit }}-${{ inputs.version }}-${{ inputs.build }}
          path: candidate

      - name: Verify and extract tested candidates
        run: |
          mkdir -p "$RELEASE_STAGING_ROOT"
          while IFS='|' read -r architecture suffix; do
            file_suffix="${suffix:+-$suffix}"
            archive="ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.zip"
            (
              cd candidate
              shasum -a 256 -c "$archive.sha256"
            )
            destination="$RELEASE_STAGING_ROOT/$architecture"
            mkdir -p "$destination"
            ditto -x -k "candidate/$archive" "$destination"
            ./scripts/validate-app-bundle.sh \
              "$destination/ASOP File Browser.app" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --require-no-bundled-tools
          done <<'VARIANTS'
          universal|
          arm64|Apple-Silicon
          x86_64|Intel
          VARIANTS

      - name: Import release credentials
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          for required_secret in \
            CERTIFICATE_BASE64 \
            CERTIFICATE_PASSWORD \
            NOTARY_KEY_BASE64 \
            NOTARY_KEY_ID \
            NOTARY_ISSUER_ID; do
            if [[ -z "${!required_secret:-}" ]]; then
              echo "Missing release environment secret: $required_secret" >&2
              exit 1
            fi
          done

          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode >"$CERTIFICATE_PATH"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode >"$NOTARY_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -x \
            -T /usr/bin/codesign \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          IDENTITIES="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")"
          IDENTITY_COUNT="$(grep -c '"Developer ID Application:' <<< "$IDENTITIES" || true)"
          if [[ "$IDENTITY_COUNT" -ne 1 ]]; then
            echo "The .p12 must contain exactly one Developer ID Application identity." >&2
            echo "$IDENTITIES" >&2
            exit 1
          fi
          CODE_SIGN_IDENTITY="$(sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' <<< "$IDENTITIES")"

          {
            echo "NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID"
            echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Apply and verify Developer ID signatures
        run: |
          for architecture in universal arm64 x86_64; do
            app_path="$RELEASE_STAGING_ROOT/$architecture/ASOP File Browser.app"
            codesign \
              --force \
              --options runtime \
              --timestamp \
              --sign "$CODE_SIGN_IDENTITY" \
              --entitlements Resources/AndroidFileBrowser.entitlements \
              "$app_path"
            ./scripts/validate-app-bundle.sh \
              "$app_path" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --team-id "$APPLE_TEAM_ID" \
              --distribution \
              --require-no-bundled-tools
            ./scripts/check-notary-submission-readiness.sh "$app_path"
          done

      - name: Create and sign the release disk images
        run: |
          while IFS='|' read -r architecture suffix; do
            file_suffix="${suffix:+-$suffix}"
            app_path="$RELEASE_STAGING_ROOT/$architecture/ASOP File Browser.app"
            disk_image="dist/ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.dmg"
            RELEASE_ARTIFACT_SUFFIX="$suffix" \
            ./scripts/create-release-disk-image.sh \
              "$app_path" \
              "dist" \
              "$APP_VERSION" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --team-id "$APPLE_TEAM_ID" \
              --distribution \
              --require-no-bundled-tools
            codesign \
              --force \
              --timestamp \
              --sign "$CODE_SIGN_IDENTITY" \
              "$disk_image"
            rm -f "$disk_image.sha256"
            ./scripts/validate-release-disk-image.sh \
              "$disk_image" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --team-id "$APPLE_TEAM_ID" \
              --distribution \
              --require-no-bundled-tools \
              --dmg-signed
          done <<'VARIANTS'
          universal|
          arm64|Apple-Silicon
          x86_64|Intel
          VARIANTS

      - name: Submit the disk images to Apple notarization
        run: |
          mkdir -p "$NOTARY_RECORDS"
          while IFS='|' read -r architecture suffix; do
            file_suffix="${suffix:+-$suffix}"
            disk_image="dist/ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.dmg"
            notary_result="$NOTARY_RECORDS/$architecture-result.json"
            notary_log="$NOTARY_RECORDS/$architecture-log.json"
            rm -f "$notary_result" "$notary_log"

            set +e
            xcrun notarytool submit "$disk_image" \
              --key "$NOTARY_KEY_PATH" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" \
              --wait \
              --output-format json >"$notary_result"
            NOTARY_EXIT_CODE=$?
            set -e

            SUBMISSION_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("id", ""))' "$notary_result" 2>/dev/null || true)"
            NOTARY_STATUS="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("status", ""))' "$notary_result" 2>/dev/null || true)"

            NOTARY_LOG_EXIT_CODE=1
            if [[ -n "$SUBMISSION_ID" ]]; then
              set +e
              xcrun notarytool log "$SUBMISSION_ID" "$notary_log" \
                --key "$NOTARY_KEY_PATH" \
                --key-id "$NOTARY_KEY_ID" \
                --issuer "$NOTARY_ISSUER_ID"
              NOTARY_LOG_EXIT_CODE=$?
              set -e
            fi

            if [[ "$NOTARY_EXIT_CODE" -ne 0 || "$NOTARY_STATUS" != "Accepted" || -z "$SUBMISSION_ID" ]]; then
              cat "$notary_result" >&2
              [[ ! -s "$notary_log" ]] || cat "$notary_log" >&2
              exit 1
            fi

            if [[ "$NOTARY_LOG_EXIT_CODE" -ne 0 || ! -s "$notary_log" ]]; then
              echo "Apple accepted $architecture, but its notarization log could not be retrieved." >&2
              exit 1
            fi

            python3 - "$notary_log" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as log_file:
              log = json.load(log_file)

          if log.get("status") != "Accepted":
              raise SystemExit("Apple's notarization log does not report Accepted status.")

          issues = log.get("issues")
          if issues not in (None, []):
              print(json.dumps(issues, indent=2), file=sys.stderr)
              raise SystemExit("Apple's notarization log contains issues.")
          PY
          done <<'VARIANTS'
          universal|
          arm64|Apple-Silicon
          x86_64|Intel
          VARIANTS

      - name: Staple and validate the release disk images
        run: |
          while IFS='|' read -r architecture suffix; do
            file_suffix="${suffix:+-$suffix}"
            disk_image="dist/ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.dmg"
            xcrun stapler staple "$disk_image"
            ./scripts/validate-release-disk-image.sh \
              "$disk_image" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --team-id "$APPLE_TEAM_ID" \
              --distribution \
              --require-no-bundled-tools \
              --dmg-notarized
            (
              cd dist
              disk_image_name="$(basename "$disk_image")"
              shasum -a 256 "$disk_image_name" >"$disk_image_name.sha256"
              shasum -a 256 -c "$disk_image_name.sha256"
            )
          done <<'VARIANTS'
          universal|
          arm64|Apple-Silicon
          x86_64|Intel
          VARIANTS

      - name: Record final disk image digest
        id: release_digest
        run: |
          echo "universal_sha256=$(shasum -a 256 "dist/ASOP-File-Browser-$APP_VERSION-macOS.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "arm64_sha256=$(shasum -a 256 "dist/ASOP-File-Browser-$APP_VERSION-macOS-Apple-Silicon.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha256=$(shasum -a 256 "dist/ASOP-File-Browser-$APP_VERSION-macOS-Intel.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Remove temporary release credentials
        if: ${{ always() }}
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f \
            "${KEYCHAIN_PATH:-}" \
            "${CERTIFICATE_PATH:-}" \
            "${NOTARY_KEY_PATH:-}"

      - name: Preserve final release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notarized-release-${{ inputs.version }}-${{ inputs.build }}
          path: |
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS.dmg
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS.dmg.sha256
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Apple-Silicon.dmg
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Apple-Silicon.dmg.sha256
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Intel.dmg
            dist/ASOP-File-Browser-${{ inputs.version }}-macOS-Intel.dmg.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload notarization records
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notarization-records-${{ inputs.version }}-${{ inputs.build }}
          path: |
            ${{ runner.temp }}/notary-records/*.json
          if-no-files-found: ignore
          retention-days: 7

  verify-release:
    name: Verify final release (${{ matrix.name }})
    needs:
      - sign-and-notarize
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple silicon
            runner: macos-15
            architecture: arm64
            suffix: Apple-Silicon
          - name: Intel
            runner: macos-15-intel
            architecture: x86_64
            suffix: Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      APP_VERSION: ${{ inputs.version }}
      APP_BUILD: ${{ inputs.build }}
      APPLE_TEAM_ID: 2XPCVTQ4HN
    steps:
      - name: Check out the release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.commit }}

      - name: Download the exact release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: notarized-release-${{ inputs.version }}-${{ inputs.build }}
          path: dist

      - name: Verify and open the universal and native downloads
        env:
          EXPECTED_UNIVERSAL_SHA256: ${{ needs.sign-and-notarize.outputs.universal_dmg_sha256 }}
          EXPECTED_ARM64_SHA256: ${{ needs.sign-and-notarize.outputs.arm64_dmg_sha256 }}
          EXPECTED_X86_64_SHA256: ${{ needs.sign-and-notarize.outputs.x86_64_dmg_sha256 }}
          NATIVE_ARCHITECTURE: ${{ matrix.architecture }}
          NATIVE_SUFFIX: ${{ matrix.suffix }}
        run: |
          case "$NATIVE_ARCHITECTURE" in
            arm64) EXPECTED_NATIVE_SHA256="$EXPECTED_ARM64_SHA256" ;;
            x86_64) EXPECTED_NATIVE_SHA256="$EXPECTED_X86_64_SHA256" ;;
            *) echo "Unexpected native architecture: $NATIVE_ARCHITECTURE" >&2; exit 1 ;;
          esac

          verify_download() {
            architecture="$1"
            suffix="$2"
            expected_sha256="$3"
            file_suffix="${suffix:+-$suffix}"
            disk_image="dist/ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.dmg"
            (
              cd dist
              shasum -a 256 -c "$(basename "$disk_image").sha256"
            )
            actual_sha256="$(shasum -a 256 "$disk_image" | awk '{print $1}')"
            if [[ "$actual_sha256" != "$expected_sha256" ]]; then
              echo "$architecture disk image changed after signing." >&2
              exit 1
            fi
            ./scripts/validate-release-disk-image.sh \
              "$disk_image" \
              --version "$APP_VERSION" \
              --build "$APP_BUILD" \
              --architecture "$architecture" \
              --team-id "$APPLE_TEAM_ID" \
              --distribution \
              --require-no-bundled-tools \
              --dmg-notarized \
              --launch-app
          }

          verify_download universal "" "$EXPECTED_UNIVERSAL_SHA256"
          verify_download "$NATIVE_ARCHITECTURE" "$NATIVE_SUFFIX" "$EXPECTED_NATIVE_SHA256"

  publish:
    name: Attest and publish
    needs:
      - sign-and-notarize
      - verify-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APP_VERSION: ${{ inputs.version }}
      RELEASE_SHA: ${{ inputs.commit }}
    steps:
      - name: Download notarized release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: notarized-release-${{ inputs.version }}-${{ inputs.build }}
          path: dist

      - name: Verify notarized release digest
        env:
          EXPECTED_UNIVERSAL_SHA256: ${{ needs.sign-and-notarize.outputs.universal_dmg_sha256 }}
          EXPECTED_ARM64_SHA256: ${{ needs.sign-and-notarize.outputs.arm64_dmg_sha256 }}
          EXPECTED_X86_64_SHA256: ${{ needs.sign-and-notarize.outputs.x86_64_dmg_sha256 }}
        run: |
          cd dist
          while IFS='|' read -r suffix expected_sha256; do
            file_suffix="${suffix:+-$suffix}"
            disk_image="ASOP-File-Browser-$APP_VERSION-macOS$file_suffix.dmg"
            sha256sum -c "$disk_image.sha256"
            actual_sha256="$(sha256sum "$disk_image" | awk '{print $1}')"
            if [[ "$actual_sha256" != "$expected_sha256" ]]; then
              echo "$disk_image changed between the signing and publishing jobs." >&2
              exit 1
            fi
          done <<VARIANTS
          |$EXPECTED_UNIVERSAL_SHA256
          Apple-Silicon|$EXPECTED_ARM64_SHA256
          Intel|$EXPECTED_X86_64_SHA256
          VARIANTS

      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/ASOP-File-Browser-${{ inputs.version }}-macOS*.dmg

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          TAG="$APP_VERSION"
          CREATED_RELEASE_ID=""

          cleanup_failed_draft() {
            status=$?
            if [[ "$status" -ne 0 && -n "$CREATED_RELEASE_ID" ]]; then
              RELEASE_STATE="$(
                gh release view "$TAG" --json databaseId,isDraft,tagName,targetCommitish \
                  --jq '[.databaseId, .isDraft, .tagName, .targetCommitish] | @tsv' \
                  2>/dev/null || true
              )"
              EXPECTED_STATE="$CREATED_RELEASE_ID"$'\ttrue\t'"$TAG"$'\t'"$RELEASE_SHA"
              if [[ "$RELEASE_STATE" == "$EXPECTED_STATE" ]]; then
                gh release delete "$TAG" --yes --cleanup-tag || true
              else
                echo "Refusing to remove a release that is not this run's matching draft." >&2
              fi
            fi
            exit "$status"
          }
          trap cleanup_failed_draft EXIT

          RELEASE_ARGUMENTS=(
            "$TAG"
            --target "$RELEASE_SHA"
            --title "ASOP File Browser $APP_VERSION"
            --generate-notes
            --draft
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            RELEASE_ARGUMENTS+=(--prerelease)
          fi
          gh release create "${RELEASE_ARGUMENTS[@]}"
          CREATED_RELEASE_ID="$(
            gh release view "$TAG" --json databaseId --jq '.databaseId'
          )"
          if [[ ! "$CREATED_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "GitHub did not return the ID of the draft release." >&2
            exit 1
          fi
          UNIVERSAL_DMG="dist/ASOP-File-Browser-$APP_VERSION-macOS.dmg"
          ARM64_DMG="dist/ASOP-File-Browser-$APP_VERSION-macOS-Apple-Silicon.dmg"
          X86_64_DMG="dist/ASOP-File-Browser-$APP_VERSION-macOS-Intel.dmg"
          ASSETS=(
            "$UNIVERSAL_DMG"
            "$UNIVERSAL_DMG.sha256"
            "$ARM64_DMG"
            "$ARM64_DMG.sha256"
            "$X86_64_DMG"
            "$X86_64_DMG.sha256"
          )
          gh release upload "$TAG" \
            "$UNIVERSAL_DMG#ASOP File Browser $APP_VERSION for macOS (Universal, recommended)" \
            "$UNIVERSAL_DMG.sha256#Universal SHA-256 checksum" \
            "$ARM64_DMG#ASOP File Browser $APP_VERSION for Apple silicon" \
            "$ARM64_DMG.sha256#Apple silicon SHA-256 checksum" \
            "$X86_64_DMG#ASOP File Browser $APP_VERSION for Intel" \
            "$X86_64_DMG.sha256#Intel SHA-256 checksum"

          for asset in "${ASSETS[@]}"; do
            asset_name="$(basename "$asset")"
            local_digest="sha256:$(sha256sum "$asset" | awk '{print $1}')"
            remote_digest="$(
              gh release view "$TAG" --json assets \
                --jq ".assets[] | select(.name == \"$asset_name\") | .digest"
            )"
            if [[ "$remote_digest" != "$local_digest" ]]; then
              echo "$asset_name changed while uploading to GitHub." >&2
              exit 1
            fi
          done

          gh release edit "$TAG" --draft=false
          CREATED_RELEASE_ID=""
          trap - EXIT
